version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_VENTAS_URL: http://ventas-api:8080/api/v1/ventas
        VITE_API_DESPACHOS_URL: http://despachos-api:8081/api/v1/despachos
    container_name: frontend-despacho
    ports:
      - "8082:8080"
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
